# Allos Reveal — KRAS4B G12C configuration
# Tuned for the SW2/P2 cryptic pocket (residues Q61, Y71, T74, G77).
# Reference: PDB 6OIM.

# KRAS G12C has a relatively rigid catalytic core; lower RMSF threshold
# to capture the subtle SW2 loop opening.
rmsf_rigid_threshold: 0.3

gpu_batch_size: 256
device: "cuda"

# SW2 pocket is smaller than typical cryptic pockets.
hotspot_score_threshold: 0.45
hotspot_min_cluster_size: 4
min_pocket_volume: 100.0

dbscan_epsilon: 5.0     # SW2 centroid can drift ~5 Å during opening
dbscan_min_samples: 3

dscore_threshold: 0.4   # higher quality threshold for KRAS

top_n_pymol: 10
write_pymol: true
